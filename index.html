<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日工作報告閱讀器</title>

  <!-- Markdown 轉 HTML 套件 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 16px 28px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    .menu-toggle {
      display: none;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      font-size: 20px;
      line-height: 1;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* 手機版遮罩 */
    .backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 20;
    }
    .backdrop.show {
      display: block;
    }

    .layout {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
    }

    /* ----- 側邊欄：檔案清單 ----- */
    .sidebar {
      width: 280px;
      flex: 0 0 280px;
      background: #ffffff;
      border-right: 1px solid #e5e7eb;
      overflow-y: auto;
      padding: 16px 0;
    }

    .sidebar h2 {
      font-size: 14px;
      color: #6b7280;
      margin: 0 0 8px;
      padding: 0 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .file-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .file-list li {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 15px;
      border-left: 3px solid transparent;
      color: #374151;
      transition: background 0.15s, border-color 0.15s;
    }

    .file-list li:hover {
      background: #f3f4f6;
    }

    .file-list li.active {
      background: #eff6ff;
      border-left-color: #2563eb;
      color: #1d4ed8;
      font-weight: bold;
    }

    .upload {
      padding: 16px 20px 8px;
      border-top: 1px solid #e5e7eb;
      margin-top: 12px;
    }

    .upload label {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    input[type="file"] {
      width: 100%;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
    }

    /* ----- 內容區 ----- */
    .content {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 32px;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      min-height: 100%;
    }

    #viewer {
      line-height: 1.8;
      font-size: 16px;
    }

    #viewer h1 {
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
      margin-top: 0;
    }

    #viewer h2 {
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 6px;
      margin-top: 32px;
    }

    #viewer h3 {
      margin-top: 28px;
    }

    #viewer p {
      margin: 12px 0;
    }

    #viewer code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: Consolas, monospace;
      color: #dc2626;
    }

    #viewer pre {
      background: #0f172a;
      color: #e5e7eb;
      padding: 18px;
      border-radius: 8px;
      overflow-x: auto;
      line-height: 1.6;
    }

    #viewer pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    #viewer blockquote {
      border-left: 4px solid #3b82f6;
      background: #eff6ff;
      padding: 10px 16px;
      margin: 16px 0;
      color: #1e3a8a;
    }

    #viewer table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }

    #viewer th,
    #viewer td {
      border: 1px solid #d1d5db;
      padding: 10px;
      text-align: left;
    }

    #viewer th {
      background: #f3f4f6;
    }

    #viewer a {
      color: #2563eb;
      text-decoration: none;
    }

    #viewer a:hover {
      text-decoration: underline;
    }

    .empty {
      color: #777;
      text-align: center;
      padding: 60px 0;
    }

    .hint {
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    /* ===== 手機 / 平板 響應式 ===== */
    @media (max-width: 768px) {
      header {
        padding: 14px 18px;
      }
      header h1 {
        font-size: 18px;
      }
      .menu-toggle {
        display: inline-block;
      }

      /* 側邊欄改為由左滑出的抽屜 */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 30;
        width: 80%;
        max-width: 300px;
        flex-basis: auto;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
      }
      .sidebar.open {
        transform: translateX(0);
      }

      .file-list li {
        padding: 14px 20px;
        font-size: 16px;
      }

      .content {
        padding: 16px;
      }
      main {
        padding: 22px 18px;
        border-radius: 8px;
      }
      #viewer {
        font-size: 16px;
      }
      #viewer pre {
        padding: 12px;
        font-size: 14px;
      }
      #viewer table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>

<body>
  <header>
    <button class="menu-toggle" id="menuToggle" aria-label="開啟報告清單">☰</button>
    <h1>每日工作報告閱讀器</h1>
  </header>

  <div class="layout">
    <div class="backdrop" id="backdrop"></div>
    <aside class="sidebar" id="sidebar">
      <h2>報告清單</h2>
      <ul class="file-list" id="fileList"></ul>

      <div class="upload">
        <label for="mdFile">或手動開啟其他 .md 檔案：</label>
        <input type="file" id="mdFile" accept=".md,.markdown,text/markdown,text/plain" />
      </div>
    </aside>

    <div class="content">
      <main>
        <article id="viewer">
          <div class="empty">請從左側選擇一份報告。</div>
        </article>
      </main>
    </div>
  </div>

  <script>
    // 所有 Markdown 報告檔名（依日期由新到舊排序）
    const FILES = [
      "工作報告_2026-06-25.md",
      "工作報告_2026-06-24.md",
      "工作報告_2026-06-23.md",
      "工作報告_2026-06-22.md",
      "工作報告_2026-06-18.md",
      "工作報告_2026-06-17.md",
      "工作報告_2026-06-16.md",
      "工作報告_2026-06-15.md",
      "工作報告_2026-06-11.md",
      "工作報告_2026-06-10.md",
      "工作報告_2026-06-09.md",
      "工作報告_2026-06-08.md",
      "工作報告_2026-06-05.md",
      "工作報告_2026-06-04.md"
    ];

    const fileListEl = document.getElementById("fileList");
    const fileInput = document.getElementById("mdFile");
    const viewer = document.getElementById("viewer");
    const sidebar = document.getElementById("sidebar");
    const backdrop = document.getElementById("backdrop");
    const menuToggle = document.getElementById("menuToggle");

    // 手機版：抽屜開合
    function openSidebar() {
      sidebar.classList.add("open");
      backdrop.classList.add("show");
    }
    function closeSidebar() {
      sidebar.classList.remove("open");
      backdrop.classList.remove("show");
    }
    menuToggle.addEventListener("click", openSidebar);
    backdrop.addEventListener("click", closeSidebar);

    // 建立側邊欄清單
    FILES.forEach((name, idx) => {
      const li = document.createElement("li");
      // 顯示時去掉副檔名讓清單更乾淨
      li.textContent = name.replace(/\.md$/, "");
      li.dataset.file = name;
      li.addEventListener("click", () => loadFile(name, li));
      fileListEl.appendChild(li);
    });

    function setActive(li) {
      document.querySelectorAll(".file-list li.active")
        .forEach(el => el.classList.remove("active"));
      if (li) li.classList.add("active");
    }

    async function loadFile(name, li) {
      setActive(li);
      closeSidebar(); // 手機版選完自動收起
      viewer.innerHTML = '<div class="empty">載入中…</div>';
      try {
        const res = await fetch(encodeURIComponent(name));
        if (!res.ok) throw new Error("HTTP " + res.status);
        const text = await res.text();
        viewer.innerHTML = marked.parse(text);
      } catch (err) {
        viewer.innerHTML =
          '<div class="hint">無法自動載入「' + name + '」。<br>' +
          '若是直接以檔案方式 (file://) 開啟此頁，瀏覽器會封鎖讀取，' +
          '請改用本機伺服器（例如在此資料夾執行 <code>python -m http.server</code> ' +
          '後以 http://localhost:8000 開啟），或使用左下角「手動開啟」功能。</div>';
      }
    }

    // 手動開啟（file:// 時的備援）
    fileInput.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;
      setActive(null);
      const reader = new FileReader();
      reader.onload = e => { viewer.innerHTML = marked.parse(e.target.result); };
      reader.onerror = () => {
        viewer.innerHTML = '<div class="empty">讀取檔案失敗，請重新選擇。</div>';
      };
      reader.readAsText(file, "UTF-8");
    });

    // 預設載入最新一份
    if (FILES.length > 0) {
      loadFile(FILES[0], fileListEl.firstChild);
    }
  </script>
</body>
</html>
